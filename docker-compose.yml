services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      - backend

